<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status {
            color: #a0a0c0;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            min-height: 1.6rem;
            font-weight: 500;
        }

        .status.win {
            color: #4ade80;
        }
        .status.draw {
            color: #fbbf24;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 320px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.08);
            padding: 8px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 10px;
            font-size: 4rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            backdrop-filter: blur(4px);
        }

        .cell:hover:not(.taken):not(.game-over) {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.03);
        }

        .cell.x {
            color: #60a5fa;
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.4);
        }

        .cell.o {
            color: #f472b6;
            text-shadow: 0 0 20px rgba(244, 114, 182, 0.4);
        }

        .cell.win-cell {
            background: rgba(74, 222, 128, 0.2) !important;
            animation: pulse 0.6s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        .cell.taken {
            cursor: default;
        }
        .cell.game-over {
            cursor: default;
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
            color: #c0c0e0;
            font-size: 0.95rem;
        }

        .scoreboard span {
            font-weight: 700;
            font-size: 1.2rem;
        }
        .scoreboard .x-score { color: #60a5fa; }
        .scoreboard .o-score { color: #f472b6; }
        .scoreboard .draws { color: #fbbf24; }

        .reset-btn {
            margin-top: 1.5rem;
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(247, 151, 30, 0.4);
        }

        .reset-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 400px) {
            .board { width: 260px; }
            .cell { font-size: 3rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        <div class="status" id="status">Player X's turn</div>

        <div class="board" id="board">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>

        <div class="scoreboard">
            <div>X: <span class="x-score" id="scoreX">0</span></div>
            <div>Draws: <span class="draws" id="scoreDraw">0</span></div>
            <div>O: <span class="o-score" id="scoreO">0</span></div>
        </div>

        <button class="reset-btn" id="resetBtn">New Game</button>
    </div>

    <script>
        const boardEl = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const statusEl = document.getElementById('status');
        const scoreXEl = document.getElementById('scoreX');
        const scoreOEl = document.getElementById('scoreO');
        const scoreDrawEl = document.getElementById('scoreDraw');
        const resetBtn = document.getElementById('resetBtn');

        let board = Array(9).fill(null);
        let currentPlayer = 'X';
        let gameActive = true;
        let scores = { X: 0, O: 0, draw: 0 };

        const winningCombos = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function checkWinner() {
            for (const combo of winningCombos) {
                const [a, b, c] = combo;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return { winner: board[a], combo };
                }
            }
            return board.every(cell => cell !== null) ? { winner: 'draw' } : null;
        }

        function updateStatus(result) {
            cells.forEach(c => c.classList.remove('win-cell', 'game-over'));

            if (!result) {
                statusEl.className = 'status';
                statusEl.textContent = `Player ${currentPlayer}'s turn`;
                return;
            }

            if (result.winner === 'draw') {
                statusEl.className = 'status draw';
                statusEl.textContent = "It's a draw!";
                scores.draw++;
                scoreDrawEl.textContent = scores.draw;
                cells.forEach(c => c.classList.add('game-over'));
                return;
            }

            statusEl.className = 'status win';
            statusEl.textContent = `Player ${result.winner} wins! 🎉`;
            scores[result.winner]++;
            if (result.winner === 'X') scoreXEl.textContent = scores.X;
            else scoreOEl.textContent = scores.O;

            result.combo.forEach(i => cells[i].classList.add('win-cell'));
            cells.forEach(c => c.classList.add('game-over'));
        }

        function handleClick(e) {
            const cell = e.currentTarget;
            const index = parseInt(cell.dataset.index);

            if (!gameActive || board[index] || !gameActive) return;

            board[index] = currentPlayer;
            cell.textContent = currentPlayer;
            cell.classList.add('taken', currentPlayer.toLowerCase());

            const result = checkWinner();
            if (result) {
                gameActive = false;
                updateStatus(result);
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                updateStatus(null);
            }
        }

        function resetGame() {
            board = Array(9).fill(null);
            currentPlayer = 'X';
            gameActive = true;

            cells.forEach(c => {
                c.textContent = '';
                c.className = 'cell';
            });

            updateStatus(null);
        }

        function resetAll() {
            resetGame();
            scores = { X: 0, O: 0, draw: 0 };
            scoreXEl.textContent = '0';
            scoreOEl.textContent = '0';
            scoreDrawEl.textContent = '0';
        }

        cells.forEach(cell => cell.addEventListener('click', handleClick));
        resetBtn.addEventListener('click', resetGame);
        document.addEventListener('keydown', e => { if (e.key === 'r' || e.key === 'R') resetGame(); });
    </script>
</body>
</html>
