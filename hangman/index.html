<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hangman</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 1rem;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8888aa;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        canvas {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            display: block;
            margin: 0 auto;
            width: 220px;
            height: 240px;
        }

        .word-display {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 12px;
            color: #fff;
            margin: 1rem 0 0.75rem;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
        }

        .hint {
            color: #a0a0c8;
            font-size: 1rem;
            margin-bottom: 1rem;
            font-style: italic;
        }

        .status {
            color: #a0a0c0;
            font-size: 1rem;
            min-height: 1.5rem;
            margin-bottom: 0.75rem;
            font-weight: 500;
        }
        .status.win { color: #4ade80; }
        .status.lose { color: #f87171; }

        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            max-width: 480px;
            margin: 0 auto;
        }

        .key {
            width: 38px;
            height: 42px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: #e0e0f0;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
        }

        .key:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(1.08);
        }

        .key:disabled {
            cursor: default;
            opacity: 0.35;
        }

        .key.correct {
            background: rgba(74, 222, 128, 0.25);
            color: #4ade80;
        }

        .key.wrong {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }

        .game-actions {
            margin-top: 1.25rem;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            padding: 10px 28px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(247, 151, 30, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #c0c0e0;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 0.75rem;
            color: #a0a0c0;
            font-size: 0.9rem;
        }

        .scoreboard span {
            font-weight: 700;
        }
        .scoreboard .wins { color: #4ade80; }
        .scoreboard .losses { color: #f87171; }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .word-display { font-size: 2rem; letter-spacing: 8px; }
            .key { width: 32px; height: 36px; font-size: 0.85rem; }
            canvas { width: 180px; height: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hangman</h1>
        <p class="subtitle">Guess the word before the stick figure is complete!</p>

        <div class="scoreboard">
            <div>Won: <span class="wins" id="scoreWins">0</span></div>
            <div>Lost: <span class="losses" id="scoreLosses">0</span></div>
        </div>

        <canvas id="hangmanCanvas" width="220" height="240"></canvas>

        <div class="word-display" id="wordDisplay"></div>
        <div class="hint" id="hint"></div>
        <div class="status" id="status">Pick a letter to start!</div>

        <div class="keyboard" id="keyboard"></div>

        <div class="game-actions">
            <button class="btn btn-primary" id="newWordBtn">New Word</button>
            <button class="btn btn-secondary" id="resetScoresBtn">Reset Scores</button>
        </div>
    </div>

    <script>
        // ── Word library (2 syllables or less, kid-friendly) ──
        const WORDS = [
            { word: "apple", hint: "A red or green fruit" },
            { word: "beach", hint: "Sandy place by the ocean" },
            { word: "bird", hint: "An animal with wings" },
            { word: "book", hint: "You read this" },
            { word: "bread", hint: "A food made from flour" },
            { word: "brush", hint: "You use this on your teeth or hair" },
            { word: "cake", hint: "A sweet birthday treat" },
            { word: "cat", hint: "A furry pet that purrs" },
            { word: "chair", hint: "You sit on it" },
            { word: "child", hint: "A young person" },
            { word: "clock", hint: "It tells the time" },
            { word: "cloud", hint: "Fluffy thing in the sky" },
            { word: "crayon", hint: "You draw with it" },
            { word: "crown", hint: "A king or queen wears it" },
            { word: "dance", hint: "Moving to music" },
            { word: "desk", hint: "A table for doing homework" },
            { word: "dog", hint: "A furry pet that barks" },
            { word: "door", hint: "You open it to enter a room" },
            { word: "drum", hint: "A musical instrument you hit" },
            { word: "duck", hint: "A bird that says quack" },
            { word: "earth", hint: "The planet we live on" },
            { word: "elephant", hint: "A very big animal with a trunk" },
            { word: "fish", hint: "An animal that swims" },
            { word: "flower", hint: "A pretty plant that blooms" },
            { word: "frog", hint: "A green animal that hops" },
            { word: "fruit", hint: "Healthy food like apples" },
            { word: "game", hint: "Something fun to play" },
            { word: "garden", hint: "Where flowers and plants grow" },
            { word: "ghost", hint: "A spooky Halloween spirit" },
            { word: "gift", hint: "Something you give on a birthday" },
            { word: "glove", hint: "You wear it on your hand" },
            { word: "grape", hint: "A small purple fruit" },
            { word: "grass", hint: "Green stuff that grows on the ground" },
            { word: "guitar", hint: "A musical instrument with strings" },
            { word: "happy", hint: "Feeling glad and joyful" },
            { word: "hat", hint: "You wear it on your head" },
            { word: "heart", hint: "An organ that pumps blood" },
            { word: "horse", hint: "An animal you can ride" },
            { word: "house", hint: "A building where you live" },
            { word: "island", hint: "Land surrounded by water" },
            { word: "juice", hint: "A drink made from fruit" },
            { word: "kite", hint: "It flies in the wind on a string" },
            { word: "kitten", hint: "A baby cat" },
            { word: "ladder", hint: "You climb up it" },
            { word: "lamp", hint: "It gives you light" },
            { word: "laugh", hint: "The sound you make when something is funny" },
            { word: "leaf", hint: "A green part of a tree" },
            { word: "lemon", hint: "A sour yellow fruit" },
            { word: "light", hint: "The opposite of dark" },
            { word: "lion", hint: "A big wild cat, the king of animals" },
            { word: "lizard", hint: "A small reptile that basks in the sun" },
            { word: "lunch", hint: "A meal you eat in the middle of the day" },
            { word: "mango", hint: "A sweet tropical fruit" },
            { word: "milk", hint: "A white drink from cows" },
            { word: "mirror", hint: "You look at yourself in it" },
            { word: "money", hint: "You use it to buy things" },
            { word: "monkey", hint: "A funny animal that climbs trees" },
            { word: "moon", hint: "It shines in the night sky" },
            { word: "mountain", hint: "A very tall hill" },
            { word: "mouse", hint: "A small animal with a long tail" },
            { word: "music", hint: "Songs and melodies" },
            { word: "nurse", hint: "A person who helps you get better" },
            { word: "ocean", hint: "A huge body of salty water" },
            { word: "orange", hint: "A round citrus fruit" },
            { word: "panda", hint: "A black and white bear from China" },
            { word: "pencil", hint: "You write with it" },
            { word: "piano", hint: "A musical instrument with keys" },
            { word: "pig", hint: "A pink farm animal" },
            { word: "pillow", hint: "You rest your head on it" },
            { word: "pizza", hint: "A round cheesy food" },
            { word: "plant", hint: "A living thing that grows in soil" },
            { word: "puppy", hint: "A baby dog" },
            { word: "queen", hint: "A female ruler" },
            { word: "rabbit", hint: "A furry animal with long ears" },
            { word: "rain", hint: "Water falling from the sky" },
            { word: "river", hint: "A long flow of water" },
            { word: "robot", hint: "A machine that can do tasks" },
            { word: "rocket", hint: "It flies into space" },
            { word: "sail", hint: "A big cloth on a boat" },
            { word: "sand", hint: "Tiny grains you find at the beach" },
            { word: "school", hint: "A place where you learn" },
            { word: "sheep", hint: "A fluffy farm animal" },
            { word: "shell", hint: "A hard outer covering of a sea creature" },
            { word: "shirt", hint: "A piece of clothing you wear on top" },
            { word: "shoe", hint: "Something you wear on your foot" },
            { word: "slide", hint: "A playground thing you go down" },
            { word: "snake", hint: "A long reptile with no legs" },
            { word: "snow", hint: "White frozen flakes from the sky" },
            { word: "socks", hint: "You wear them on your feet" },
            { word: "spider", hint: "A small creature with eight legs" },
            { word: "spoon", hint: "You use it to eat soup" },
            { word: "stairs", hint: "Steps you walk up and down" },
            { word: "star", hint: "A bright dot in the night sky" },
            { word: "storm", hint: "Bad weather with thunder and rain" },
            { word: "sun", hint: "The bright star in our sky" },
            { word: "swing", hint: "A playground seat that goes back and forth" },
            { word: "table", hint: "A flat piece of furniture" },
            { word: "tiger", hint: "A big orange and black striped cat" },
            { word: "toast", hint: "Golden brown bread" },
            { word: "tree", hint: "A tall plant with leaves" },
            { word: "truck", hint: "A big vehicle that carries things" },
            { word: "water", hint: "You drink it to stay hydrated" },
            { word: "whale", hint: "The biggest animal in the ocean" },
            { word: "wheel", hint: "A round thing that helps things roll" },
            { word: "window", hint: "You look through it to see outside" },
            { word: "winter", hint: "The cold season with snow" },
            { word: "zebra", hint: "A black and white striped horse" }
        ];

        // ── Hangman drawing ──
        const canvas = document.getElementById('hangmanCanvas');
        const ctx = canvas.getContext('2d');

        const DRAW_STEPS = [
            // 0: base
            () => {
                ctx.strokeStyle = '#555577';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(20, 230); ctx.lineTo(200, 230);
                ctx.moveTo(50, 230); ctx.lineTo(50, 20);
                ctx.lineTo(140, 20); ctx.lineTo(140, 45);
                ctx.stroke();
            },
            // 1: head
            () => {
                ctx.strokeStyle = '#e0e0f0';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(140, 62, 17, 0, Math.PI * 2);
                ctx.stroke();
            },
            // 2: body
            () => {
                ctx.beginPath();
                ctx.moveTo(140, 79); ctx.lineTo(140, 145);
                ctx.stroke();
            },
            // 3: left arm
            () => {
                ctx.beginPath();
                ctx.moveTo(140, 95); ctx.lineTo(110, 130);
                ctx.stroke();
            },
            // 4: right arm
            () => {
                ctx.beginPath();
                ctx.moveTo(140, 95); ctx.lineTo(170, 130);
                ctx.stroke();
            },
            // 5: left leg
            () => {
                ctx.beginPath();
                ctx.moveTo(140, 145); ctx.lineTo(110, 195);
                ctx.stroke();
            },
            // 6: right leg
            () => {
                ctx.beginPath();
                ctx.moveTo(140, 145); ctx.lineTo(170, 195);
                ctx.stroke();
            }
        ];

        function drawGallows() {
            ctx.clearRect(0, 0, 220, 240);
            DRAW_STEPS[0]();
        }

        // ── Game state ──
        let currentWordObj = null;
        let guessedLetters = null;
        let wrongCount = 0;
        let gameOver = false;
        let wins = 0;
        let losses = 0;
        let usedWords = [];

        const wordDisplay = document.getElementById('wordDisplay');
        const hintEl = document.getElementById('hint');
        const statusEl = document.getElementById('status');
        const keyboardEl = document.getElementById('keyboard');
        const scoreWins = document.getElementById('scoreWins');
        const scoreLosses = document.getElementById('scoreLosses');

        function buildKeyboard() {
            keyboardEl.innerHTML = '';
            for (let i = 0; i < 26; i++) {
                const key = document.createElement('button');
                key.className = 'key';
                key.textContent = String.fromCharCode(97 + i);
                key.dataset.letter = String.fromCharCode(97 + i);
                key.addEventListener('click', () => handleGuess(key.dataset.letter));
                keyboardEl.appendChild(key);
            }
        }

        function pickWord() {
            const available = WORDS.filter(w => !usedWords.includes(w.word));
            if (available.length === 0) {
                usedWords = [];
                return pickWord();
            }
            const idx = Math.floor(Math.random() * available.length);
            return available[idx];
        }

        function startGame() {
            currentWordObj = pickWord();
            guessedLetters = new Set();
            wrongCount = 0;
            gameOver = false;

            document.querySelectorAll('.key').forEach(k => {
                k.disabled = false;
                k.className = 'key';
            });

            drawGallows();
            renderWord();
            hintEl.textContent = `💡 ${currentWordObj.hint}`;
            statusEl.className = 'status';
            statusEl.textContent = 'Pick a letter!';
        }

        function renderWord() {
            const display = currentWordObj.word
                .split('')
                .map(ch => guessedLetters.has(ch) ? ch : '_')
                .join(' ');
            wordDisplay.textContent = display;
        }

        function handleGuess(letter) {
            if (gameOver || guessedLetters.has(letter)) return;
            guessedLetters.add(letter);

            const key = document.querySelector(`.key[data-letter="${letter}"]`);
            const word = currentWordObj.word;

            if (word.includes(letter)) {
                key.classList.add('correct');
                key.disabled = true;
                renderWord();

                const won = word.split('').every(ch => guessedLetters.has(ch));
                if (won) {
                    gameOver = true;
                    wins++;
                    scoreWins.textContent = wins;
                    statusEl.className = 'status win';
                    statusEl.textContent = '🎉 You won! Great job!';
                    document.querySelectorAll('.key').forEach(k => k.disabled = true);
                } else {
                    statusEl.textContent = '✅ Correct! Keep going!';
                }
            } else {
                key.classList.add('wrong');
                key.disabled = true;
                wrongCount++;
                drawHangmanStep(wrongCount);

                if (wrongCount >= 6) {
                    gameOver = true;
                    losses++;
                    scoreLosses.textContent = losses;
                    statusEl.className = 'status lose';
                    statusEl.textContent = `💀 Oh no! The word was "${currentWordObj.word}"`;
                    wordDisplay.textContent = currentWordObj.word.split('').join(' ');
                    document.querySelectorAll('.key').forEach(k => k.disabled = true);
                } else {
                    statusEl.textContent = `❌ Wrong! ${6 - wrongCount} mistake${6 - wrongCount > 1 ? 's' : ''} left`;
                }
            }
        }

        function drawHangmanStep(step) {
            if (step >= 1 && step < DRAW_STEPS.length) {
                DRAW_STEPS[step]();
            }
        }

        function resetScores() {
            wins = 0;
            losses = 0;
            scoreWins.textContent = '0';
            scoreLosses.textContent = '0';
            usedWords = [];
            startGame();
        }

        function newWord() {
            if (currentWordObj) usedWords.push(currentWordObj.word);
            startGame();
        }

        // ── Init ──
        buildKeyboard();
        startGame();

        document.getElementById('newWordBtn').addEventListener('click', newWord);
        document.getElementById('resetScoresBtn').addEventListener('click', resetScores);

        // Physical keyboard support
        document.addEventListener('keydown', (e) => {
            const ch = e.key.toLowerCase();
            if (/^[a-z]$/.test(ch)) {
                const key = document.querySelector(`.key[data-letter="${ch}"]`);
                if (key && !key.disabled) handleGuess(ch);
            }
            if (e.key === 'Enter') newWord();
        });
    </script>
</body>
</html>
